# ===============================
# DATABASE CONFIGURATION - PostgreSQL on Render
# ===============================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ===============================
# JPA / HIBERNATE for PostgreSQL
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=${PORT:8080}

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# ===============================
# PAYU CONFIGURATION
# ===============================
payu.key=${PAYU_KEY}
payu.salt=${PAYU_SALT}
payu.url=${PAYU_URL}

# ===============================
# GROQ AI API
# ===============================
groq.api.key=${GROQ_API_KEY}
groq.api.url=${GROQ_API_URL}

# ===============================
# TWILIO SMS
# ===============================
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.phone-number=${TWILIO_PHONE_NUMBER}
twilio.enabled=${TWILIO_ENABLED}

# ===============================
# FAST2SMS
# ===============================
fast2sms.api.key=${FAST2SMS_API_KEY}
fast2sms.enabled=${FAST2SMS_ENABLED}

# ===============================
# EMAIL - Gmail SMTP
# ===============================
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# OTP CONFIG
# ===============================
otp.expiry.minutes=${OTP_EXPIRY_MINUTES}

# ===============================
# DATA.GOV.IN API
# ===============================
datagov.api.key=${DATAGOV_API_KEY}